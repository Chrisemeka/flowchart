name: Next.js CI pipline 

on: 
  push: 
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs: 
  build-and-test: 
    runs-on: ubuntu-latest 

    steps: 
    #Step 1: Grab the  code from the repository
      - name: Checkout Repository 
        uses: actions/checkout@v4
      
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with: 
          node-version: "24.12.0"
          cache: "npm"
      
      - name: Install Dependencies 
        run: npm ci
      
      - name: Run Linter
        run: npm run lint 

      - name: Build Next.js App 
        run: npm run build